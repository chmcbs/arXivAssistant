# Production overrides. Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build
#
# Required host env vars: APP_BASE_URL, INTERNAL_CRON_TOKEN, SMTP_HOST, EMAIL_FROM
services:
  db:
    ports: []

  api:
    environment:
      APP_ENV: production
      APP_BASE_URL: ${APP_BASE_URL:?APP_BASE_URL is required}
      DATABASE_URL: postgresql://postgres:postgres@db:5432/arxiv_assistant
      INTERNAL_CRON_TOKEN: ${INTERNAL_CRON_TOKEN:?INTERNAL_CRON_TOKEN is required}
      SMTP_HOST: ${SMTP_HOST:?SMTP_HOST is required}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      EMAIL_FROM: ${EMAIL_FROM:?EMAIL_FROM is required}
      TRUST_PROXY_HEADERS: ${TRUST_PROXY_HEADERS:-1}
      DEBUG_ADMIN_EMAILS: ${DEBUG_ADMIN_EMAILS:-}
      ALLOW_DEBUG_FEATURES: ${ALLOW_DEBUG_FEATURES:-0}
      INGESTION_MAX_RESULTS: ${INGESTION_MAX_RESULTS:-150}
      EMBEDDING_LIMIT: ${EMBEDDING_LIMIT:-600}
      DAILY_PICKS_GENERATE_LIMIT_PER_USER: ${DAILY_PICKS_GENERATE_LIMIT_PER_USER:-5}

  worker:
    environment:
      APP_BASE_URL: http://api:8000
      INTERNAL_CRON_TOKEN: ${INTERNAL_CRON_TOKEN:?INTERNAL_CRON_TOKEN is required}
