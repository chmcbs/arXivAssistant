services:
  db:
    image: pgvector/pgvector:pg16
    container_name: arxiv-assistant-db
    environment:
      POSTGRES_DB: arxiv_assistant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: